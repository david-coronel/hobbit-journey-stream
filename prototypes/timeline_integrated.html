<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', 'Georgia', serif; background: #0a0a0f; color: #e0d0b0; }

.header { padding: 18px 24px; background: #111116; border-bottom: 1px solid #2a2520; display: flex; gap: 40px; align-items: center; }
h1 { font-size: 18px; color: #d4af37; font-weight: normal; letter-spacing: 1px; }
.stats { display: flex; gap: 24px; font-size: 13px; color: #a09070; }
.stats b { color: #d4af37; font-size: 14px; display: block; }

.controls { padding: 10px 24px; background: #111116; border-bottom: 1px solid #2a2520; display: flex; gap: 20px; align-items: center; }
.controls label { font-size: 12px; color: #8b7355; }
.controls input[type=range] { width: 200px; accent-color: #d4af37; }
.legend { display: flex; gap: 16px; font-size: 12px; color: #a09070; }
.legend span { display: inline-block; width: 14px; height: 14px; border-radius: 3px; margin-right: 6px; vertical-align: middle; }

.main { display: flex; flex-direction: column; height: calc(100vh - 140px); }

.overview { height: 70px; background: #0f0f14; border-bottom: 1px solid #2a2520; padding: 10px 24px; position: relative; overflow: hidden; }
.overview-label { font-size: 10px; color: #8b7355; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
.overview-track { position: relative; height: 30px; background: #1a1a22; border-radius: 4px; overflow: hidden; }
.overview-seg { position: absolute; top: 0; bottom: 0; opacity: 0.85; }
.overview-seg.canon { background: linear-gradient(180deg, #d4af37, #b8942e); }
.overview-seg.gap { background: linear-gradient(180deg, #5a9a3d, #3a6a2d); }
.overview-chapter { position: absolute; bottom: 2px; font-size: 9px; color: rgba(255,255,255,0.4); transform: translateX(-50%); pointer-events: none; }

.day-grid { flex: 1; overflow: auto; padding: 10px 24px 40px; }
.day-row { display: flex; align-items: center; margin-bottom: 2px; height: 18px; }
.day-label { width: 60px; font-size: 10px; color: #5a5045; text-align: right; padding-right: 10px; font-family: 'Courier New', monospace; }
.day-bar { flex: 1; position: relative; height: 14px; background: #0f0f14; border-radius: 2px; overflow: hidden; }
.day-bar.empty { background: repeating-linear-gradient(45deg, #0f0f14, #0f0f14 4px, #15151a 4px, #15151a 8px); }

.seg { position: absolute; top: 1px; bottom: 1px; border-radius: 2px; cursor: pointer; transition: opacity 0.15s; }
.seg:hover { opacity: 0.7; z-index: 10; }

.tooltip { position: fixed; background: rgba(20,20,25,0.95); border: 1px solid #3a3530; border-radius: 6px; padding: 10px 12px; font-size: 12px; color: #e0d0b0; pointer-events: none; z-index: 10000; max-width: 260px; line-height: 1.5; display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.tooltip .type { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.tooltip .type.canon { color: #d4af37; }
.tooltip .type.gap { color: #5a9a3d; }
.tooltip .title { font-weight: bold; color: #f0e8d8; margin-bottom: 2px; }
.tooltip .meta { font-size: 11px; color: #8b7355; }

.day-detail { position: fixed; right: 0; top: 140px; bottom: 0; width: 320px; background: #111116; border-left: 1px solid #2a2520; padding: 20px; overflow-y: auto; transform: translateX(100%); transition: transform 0.2s; z-index: 100; }
.day-detail.open { transform: translateX(0); }
.day-detail h3 { font-size: 14px; color: #d4af37; font-weight: normal; margin-bottom: 16px; }
.event-item { padding: 10px 0; border-bottom: 1px solid #1a1a20; }
.event-item:last-child { border-bottom: none; }
.event-badge { display: inline-block; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; padding: 2px 6px; border-radius: 3px; margin-bottom: 4px; }
.event-badge.canon { background: rgba(212,175,55,0.15); color: #d4af37; border: 1px solid rgba(212,175,55,0.3); }
.event-badge.gap { background: rgba(90,154,61,0.15); color: #5a9a3d; border: 1px solid rgba(90,154,61,0.3); }
.event-title { font-size: 13px; color: #f0e8d8; margin-bottom: 2px; }
.event-meta { font-size: 11px; color: #5a5045; }
.close-detail { position: absolute; top: 10px; right: 14px; background: none; border: none; color: #8b7355; font-size: 18px; cursor: pointer; }
.close-detail:hover { color: #d4af37; }

.toggle-detail { position: fixed; bottom: 14px; right: 14px; background: #1a1712; border: 1px solid #3a3530; color: #a09070; padding: 8px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; z-index: 101; }
.toggle-detail:hover { border-color: #5a5045; color: #e0d0b0; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: #2a2520; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #3a3530; }

const chShort = {"An Unexpected Party": "1. Party", "Roast Mutton": "2. Mutton", "A Short Rest": "3. Rest", "Over Hill and Under Hill": "4. Hill", "Riddles in the Dark": "5. Riddles", "Out of the Frying-Pan into the Fire": "6. Frying-Pan", "Queer Lodgings": "7. Lodgings", "Flies and Spiders": "8. Spiders", "Barrels Out of Bond": "9. Barrels", "A Warm Welcome": "10. Welcome", "On the Doorstep": "11. Doorstep", "Inside Information": "12. Information", "Not at Home": "13. Not Home", "Fire and Water": "14. Fire/Water", "The Gathering of the Clouds": "15. Gathering", "A Thief in the Night": "16. Thief", "The Clouds Burst": "17. Clouds", "The Return Journey": "18. Return", "The Last Stage": "19. Last Stage"};
const minDay = 0;
const maxDay = 422;

const chColors = {
    "An Unexpected Party": "#e6b045",
    "Roast Mutton": "#d97a5e",
    "A Short Rest": "#7dbf7a",
    "Over Hill and Under Hill": "#6a9ce6",
    "Riddles in the Dark": "#9a7ad4",

const grid = document.getElementById('day-grid');
const overview = document.getElementById('overview-track');
const tooltip = document.getElementById('tooltip');
const zoom = document.getElementById('zoom');
let selectedDay = null;

function renderOverview() {
    const total = maxDay - minDay + 1;
    overview.innerHTML = '';
    chBands.forEach(b => {
        const el = document.createElement('div');
        el.className = 'overview-seg';
        el.style.left = (((b.start - minDay) / total) * 100) + '%';
        el.style.width = (((b.end - b.start + 1) / total) * 100) + '%';
        el.style.background = 'rgba(255,255,255,0.06)';
        el.style.borderBottom = '1px dashed rgba(255,255,255,0.15)';
        overview.appendChild(el);
        const label = document.createElement('div');
        label.className = 'overview-chapter';
        label.style.left = (((b.start + b.end) / 2 - minDay) / total * 100) + '%';
        label.textContent = chShort[b.chapter] || b.chapter;
        overview.appendChild(label);
    });
    for (let d = minDay; d <= maxDay; d++) {
        const evs = dayEvents[d] || [];
        if (!evs.length) continue;
        const canon = evs.find(e => e.type === 'canon');
        const el = document.createElement('div');
        el.className = 'overview-seg';
        el.style.left = (((d - minDay) / total) * 100) + '%';
        el.style.width = ((1 / total) * 100) + '%';
        el.style.background = canon ? (chColors[canon.chapter] || '#5a5045') : 'linear-gradient(180deg, #5a9a3d, #3a6a2d)';
        overview.appendChild(el);
    }
}

function renderGrid() {
    grid.innerHTML = '';
    const z = parseFloat(zoom.value);
    const hourWidth = 12 * z;
    const dayWidth = hourWidth * 24;
    for (let d = minDay; d <= maxDay; d++) {
        const row = document.createElement('div');
        row.className = 'day-row';
        const label = document.createElement('div');
        label.className = 'day-label';
        label.textContent = 'Day ' + d;
        label.style.cursor = 'pointer';
        label.onclick = () => openDetail(d);
        row.appendChild(label);
        const bar = document.createElement('div');
        bar.className = 'day-bar';
        bar.style.width = dayWidth + 'px';
        const evs = dayEvents[d] || [];
        if (!evs.length) {
            bar.classList.add('empty');
        } else {
            evs.forEach(e => {
                const seg = document.createElement('div');
                seg.className = 'seg';
                seg.style.left = ((e.start_hour / 24) * 100) + '%';
                seg.style.width = (((e.end_hour - e.start_hour) / 24) * 100) + '%';
                if (e.type === 'canon') {
                    seg.style.background = chColors[e.chapter] || '#5a5045';
                } else {
                    seg.style.background = 'linear-gradient(180deg, #5a9a3d, #3a6a2d)';
                }
                seg.onmouseenter = (evt) => showTooltip(evt, e);
                seg.onmouseleave = hideTooltip;
                bar.appendChild(seg);
            });
        }
        row.appendChild(bar);
        grid.appendChild(row);
    }
}

function showTooltip(evt, e) {
    tooltip.style.display = 'block';
    tooltip.querySelector('#tt-type').textContent = e.type === 'canon' ? 'Canon Scene' : 'Generated Gap';
    tooltip.querySelector('#tt-type').className = 'type ' + e.type;
    tooltip.querySelector('#tt-title').textContent = e.title;
    let meta = e.duration.toFixed(1) + 'h · ' + (e.time_label || e.start_hour + ':00');
    if (e.type === 'gap') meta += ' · ' + (e.gap_type || 'gap');
    if (e.chapter) meta += ' · Ch. ' + e.chapter_num + ' ' + (chShort[e.chapter] || e.chapter);
    tooltip.querySelector('#tt-meta').textContent = meta;
    moveTooltip(evt);
}
function moveTooltip(evt) {
    const x = evt.clientX + 12;
    const y = evt.clientY + 12;
    tooltip.style.left = Math.min(x, window.innerWidth - 280) + 'px';
    tooltip.style.top = Math.min(y, window.innerHeight - 120) + 'px';
}
function hideTooltip() {
    tooltip.style.display = 'none';
}
document.addEventListener('mousemove', (e) => {
    if (tooltip.style.display === 'block') moveTooltip(e);
});

function openDetail(day) {
    selectedDay = day;
    const panel = document.getElementById('day-detail');
    document.getElementById('detail-title').textContent = 'Day ' + day;
    const evs = dayEvents[day] || [];
    let html = '';
    if (!evs.length) {
        html = '<div style="color:#5a5045;font-style:italic;margin-top:10px;">No events on this day. Silence in the narrative.</div>';
    } else {
        evs.forEach(e => {
            html += '<div class="event-item">';
            html += '<div class="event-badge ' + e.type + '">' + (e.type === 'canon' ? 'Canon' : 'Gap') + '</div>';
            html += '<div class="event-title">' + e.title + '</div>';
            html += '<div class="event-meta">' + e.duration.toFixed(1) + 'h · ' + (e.time_label || e.start_hour + ':00');
            if (e.gap_type) html += ' · ' + e.gap_type;
            if (e.chapter) html += ' · Ch. ' + e.chapter_num + ' ' + (chShort[e.chapter] || e.chapter);
            html += '</div></div>';
        });
    }
    document.getElementById('detail-content').innerHTML = html;
    panel.classList.add('open');
    document.getElementById('toggle-detail').style.display = 'none';
}
function closeDetail() {
    document.getElementById('day-detail').classList.remove('open');
}
function toggleDetail() {
    document.getElementById('day-detail').classList.toggle('open');
}
zoom.addEventListener('input', renderGrid);
renderOverview();
renderGrid();
</script>
